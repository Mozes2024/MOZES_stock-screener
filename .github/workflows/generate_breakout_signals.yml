name: Generate Breakout Signals (SP500 feed)
# ─────────────────────────────────────────────────────────────────────────────
# ARCHITECTURE (v2 — fast path):
#   Step 1 → daily_screening_git_storage.yml (12:00 UTC)
#            Scans full US market, saves structured output:
#              data/daily_scans/latest_structured_scan.pkl
#              data/daily_scans/latest_structured_scan.json
#
#   Step 2 → THIS workflow (12:45 UTC)
#            Reads the pickle (~2-3 seconds), filters to buy-signal quality,
#            formats breakout_signals.json, triggers SP500-Quant-Ranker.
#
#   FALLBACK: If pickle is missing/stale, falls back to full scan (~20-25 min).
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '45 12 * * 1-5'   # 12:45 UTC — runs ~45min after daily_screening (12:00 UTC)
                               # daily_screening saves the pickle; this reads from it.

  workflow_dispatch:            # כפתור הרצה ידנית ב-GitHub
    inputs:
      min_score:
        description: 'Minimum signal score (default 60)'
        required: false
        default: '60'
      force_scan:
        description: 'Force full scan (ignore pickle)'
        required: false
        type: boolean
        default: false
      max_age:
        description: 'Max pickle age in hours (default 6)'
        required: false
        default: '6'

jobs:
  generate-breakout-signals:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for structured scan data
        id: check-pickle
        run: |
          if [ -f "data/daily_scans/latest_structured_scan.pkl" ]; then
            PKL_SIZE=$(du -h data/daily_scans/latest_structured_scan.pkl | cut -f1)
            PKL_AGE=$(python3 -c "
          import os, time
          age_h = (time.time() - os.path.getmtime('data/daily_scans/latest_structured_scan.pkl')) / 3600
          print(f'{age_h:.1f}')
          ")
            echo "✅ Pickle found: $PKL_SIZE, age: ${PKL_AGE}h"
            echo "has_pickle=true" >> $GITHUB_OUTPUT

            # Show summary if JSON exists
            if [ -f "data/daily_scans/latest_structured_scan.json" ]; then
              echo "Summary:"
              cat data/daily_scans/latest_structured_scan.json
            fi
          else
            echo "⚠️ No pickle — will fallback to full scan"
            echo "has_pickle=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Generate breakout_signals.json
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          MIN_SCORE="${{ github.event.inputs.min_score || '60' }}"
          MAX_AGE="${{ github.event.inputs.max_age || '6' }}"
          FORCE_SCAN="${{ github.event.inputs.force_scan || 'false' }}"

          FLAGS="--min-score $MIN_SCORE --max-age $MAX_AGE"
          if [ "$FORCE_SCAN" = "true" ]; then
            FLAGS="$FLAGS --force-scan"
          fi

          echo "Running: python generate_breakout_signals_for_sp500.py $FLAGS"
          python generate_breakout_signals_for_sp500.py $FLAGS

      - name: Verify output
        run: |
          if [ ! -f "breakout_signals.json" ]; then
            echo "❌ breakout_signals.json לא נוצר"
            exit 1
          fi
          COUNT=$(python3 -c "import json; d=json.load(open('breakout_signals.json')); print(d.get('top_signals_count', 0))")
          REGIME=$(python3 -c "import json; d=json.load(open('breakout_signals.json')); print(d.get('market_regime','?'))")
          echo "✅ breakout_signals.json נוצר: ${COUNT} signals | ${REGIME}"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin main
          git add breakout_signals.json

          if git diff --staged --quiet; then
            echo "אין שינויים — לא צריך commit"
          else
            git commit -m "📡 Update breakout_signals.json - ${{ steps.date.outputs.date }}"
            git push || (sleep 5 && git pull --rebase --autostash origin main && git push)
            echo "✅ Pushed"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: breakout-signals-${{ steps.date.outputs.date }}
          path: breakout_signals.json
          if-no-files-found: warn
          retention-days: 30

      # ── Trigger SP500-Quant-Ranker ────────────────────────────────
      # שולח repository_dispatch לריפו של ה-Ranker.
      # ה-Ranker כבר יודע למשוך את breakout_signals.json עם curl.
      # דרוש: secret בשם RANKER_PAT עם הרשאת repo על ריפו ה-Ranker.
      - name: Trigger SP500-Quant-Ranker pipeline
        if: success()
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.RANKER_PAT }}" \
            https://api.github.com/repos/Mozes2024/SP500-Quant-Ranker_2026/dispatches \
            -d '{"event_type":"breakout_signals_ready","client_payload":{"scan_date":"${{ steps.date.outputs.date }}"}}')

          if [ "$HTTP_STATUS" = "204" ]; then
            echo "✅ Triggered SP500-Quant-Ranker (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Dispatch returned HTTP $HTTP_STATUS — check RANKER_PAT secret"
          fi
