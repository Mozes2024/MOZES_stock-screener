name: Generate Breakout Signals (SP500 feed)

on:
  schedule:
    - cron: '45 13 * * 1-5'   # 13:45 UTC = 15:45 ישראל (45 דק' אחרי סיום הסקרינינג)

  workflow_dispatch:            # כפתור הרצה ידנית ב-GitHub
    inputs:
      min_score:
        description: 'Minimum signal score (default 60)'
        required: false
        default: '60'
      conservative:
        description: 'Conservative mode (slower, safer)'
        required: false
        default: 'true'

jobs:
  generate-breakout-signals:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Generate breakout_signals.json
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          MIN_SCORE="${{ github.event.inputs.min_score || '60' }}"
          CONSERVATIVE="${{ github.event.inputs.conservative || 'true' }}"

          FLAGS="--min-score $MIN_SCORE"
          if [ "$CONSERVATIVE" = "true" ]; then
            FLAGS="$FLAGS --conservative"
          fi

          echo "Running: python generate_breakout_signals_for_sp500.py $FLAGS"
          python generate_breakout_signals_for_sp500.py $FLAGS

      - name: Verify output
        run: |
          if [ ! -f "breakout_signals.json" ]; then
            echo "❌ breakout_signals.json לא נוצר"
            exit 1
          fi
          COUNT=$(python3 -c "import json; d=json.load(open('breakout_signals.json')); print(d.get('top_signals_count', 0))")
          REGIME=$(python3 -c "import json; d=json.load(open('breakout_signals.json')); print(d.get('market_regime','?'))")
          echo "✅ breakout_signals.json נוצר: ${COUNT} signals | ${REGIME}"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin main
          git add breakout_signals.json

          if git diff --staged --quiet; then
            echo "אין שינויים — לא צריך commit"
          else
            git commit -m "📡 Update breakout_signals.json - ${{ steps.date.outputs.date }}"
            git push || (sleep 5 && git pull --rebase --autostash origin main && git push)
            echo "✅ Pushed"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: breakout-signals-${{ steps.date.outputs.date }}
          path: breakout_signals.json
          if-no-files-found: warn
          retention-days: 30
